<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="359" rx="12" fill="#ffffff" stroke="#e3e5e8"/>

  <!-- pipeline -->
  <rect x="60" y="40" width="200" height="96" rx="10" fill="#fcfcfd" stroke="#9aa0a8" stroke-width="1.2"/>
  <text x="160" y="64" text-anchor="middle" font-size="13" fill="#3b4252" font-weight="600">pipeline</text>
  <g font-size="12.5" fill="#2b3147" text-anchor="middle">
    <rect x="78" y="80" width="68" height="36" rx="7" fill="#eef0fb" stroke="#4051b5" stroke-width="1.3"/>
    <text x="112" y="103">map</text>
    <rect x="174" y="80" width="68" height="36" rx="7" fill="#eef0fb" stroke="#4051b5" stroke-width="1.3"/>
    <text x="208" y="103">reduce</text>
  </g>
  <line x1="146" y1="98" x2="170" y2="98" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>

  <line x1="260" y1="88" x2="346" y2="88" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- optimizer -->
  <rect x="354" y="28" width="226" height="152" rx="10" fill="#fcfcfd" stroke="#9aa0a8" stroke-width="1.2"/>
  <text x="467" y="52" text-anchor="middle" font-size="13" fill="#3b4252" font-weight="600">optimizer</text>

  <!-- candidate chains: plain boxes, one picked -->
  <g fill="#f4f5f7" stroke="#c4c8ce" stroke-width="1.1">
    <rect x="384" y="66" width="36" height="20" rx="5"/>
    <rect x="430" y="66" width="36" height="20" rx="5"/>
    <rect x="384" y="134" width="36" height="20" rx="5"/>
    <rect x="430" y="134" width="36" height="20" rx="5"/>
    <rect x="476" y="134" width="36" height="20" rx="5"/>
  </g>
  <g fill="#eef0fb" stroke="#4051b5" stroke-width="1.4">
    <rect x="384" y="100" width="36" height="20" rx="5"/>
    <rect x="430" y="100" width="36" height="20" rx="5"/>
    <rect x="476" y="100" width="36" height="20" rx="5"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="1.1">
    <line x1="420" y1="76" x2="430" y2="76"/>
    <line x1="420" y1="144" x2="430" y2="144"/>
    <line x1="466" y1="144" x2="476" y2="144"/>
  </g>
  <g stroke="#4051b5" stroke-width="1.2">
    <line x1="420" y1="110" x2="430" y2="110"/>
    <line x1="466" y1="110" x2="476" y2="110"/>
  </g>
  <!-- marks -->
  <g stroke="#b3b8bf" stroke-width="1.8" stroke-linecap="round">
    <line x1="534" y1="70" x2="546" y2="82"/>
    <line x1="546" y1="70" x2="534" y2="82"/>
    <line x1="534" y1="138" x2="546" y2="150"/>
    <line x1="546" y1="138" x2="534" y2="150"/>
  </g>
  <path d="M 532 110 L 538 117 L 549 102" fill="none" stroke="#4051b5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- optimizer picks, engine executes -->
  <line x1="467" y1="180" x2="467" y2="222" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- execution engine -->
  <rect x="354" y="226" width="226" height="64" rx="10" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
  <text x="467" y="264" text-anchor="middle" font-size="13.5" fill="#2b3147" font-weight="600">execution engine</text>

  <!-- documents -->
  <g stroke="#9aa0a8" fill="#fafafa" stroke-width="1.2">
    <rect x="92" y="222" width="56" height="72" rx="5"/>
    <rect x="98" y="216" width="56" height="72" rx="5"/>
    <rect x="104" y="210" width="56" height="72" rx="5" fill="#ffffff"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="2" stroke-linecap="round">
    <line x1="112" y1="226" x2="152" y2="226"/>
    <line x1="112" y1="238" x2="146" y2="238"/>
    <line x1="112" y1="250" x2="150" y2="250"/>
    <line x1="112" y1="262" x2="140" y2="262"/>
  </g>
  <text x="126" y="322" text-anchor="middle" font-size="13" fill="#3b4252">documents</text>

  <line x1="166" y1="258" x2="346" y2="258" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="580" y1="258" x2="618" y2="258" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- output -->
  <g>
    <rect x="626" y="212" width="104" height="84" rx="6" fill="#ffffff" stroke="#9aa0a8" stroke-width="1.2"/>
    <rect x="626" y="212" width="104" height="20" rx="6" fill="#f1f2f4" stroke="#9aa0a8" stroke-width="1.2"/>
    <line x1="626" y1="232" x2="730" y2="232" stroke="#9aa0a8" stroke-width="1.2"/>
    <line x1="626" y1="253" x2="730" y2="253" stroke="#e3e5e8"/>
    <line x1="626" y1="274" x2="730" y2="274" stroke="#e3e5e8"/>
    <line x1="678" y1="212" x2="678" y2="296" stroke="#e3e5e8"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="2" stroke-linecap="round">
    <line x1="634" y1="222" x2="668" y2="222"/>
    <line x1="686" y1="222" x2="720" y2="222"/>
    <line x1="634" y1="243" x2="662" y2="243"/>
    <line x1="686" y1="243" x2="722" y2="243"/>
    <line x1="634" y1="264" x2="670" y2="264"/>
    <line x1="686" y1="264" x2="714" y2="264"/>
    <line x1="634" y1="285" x2="656" y2="285"/>
    <line x1="686" y1="285" x2="718" y2="285"/>
  </g>
  <text x="678" y="322" text-anchor="middle" font-size="13" fill="#3b4252">output</text>
</svg>
