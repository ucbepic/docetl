<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="779" height="399" rx="12" fill="#ffffff" stroke="#e3e5e8"/>

  <!-- you provide -->
  <rect x="28" y="40" width="272" height="330" rx="10" fill="none" stroke="#c4c8ce" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="44" y="64" font-size="12" fill="#8a8f98" font-weight="600" letter-spacing="0.4">YOU PROVIDE</text>

  <!-- pipeline -->
  <rect x="52" y="84" width="222" height="92" rx="10" fill="#fcfcfd" stroke="#9aa0a8" stroke-width="1.2"/>
  <text x="163" y="108" text-anchor="middle" font-size="13" fill="#3b4252" font-weight="600">pipeline</text>
  <g font-size="12.5" fill="#2b3147" text-anchor="middle">
    <rect x="70" y="122" width="68" height="36" rx="7" fill="#eef0fb" stroke="#4051b5" stroke-width="1.3"/>
    <text x="104" y="145">map</text>
    <rect x="188" y="122" width="68" height="36" rx="7" fill="#eef0fb" stroke="#4051b5" stroke-width="1.3"/>
    <text x="222" y="145">reduce</text>
  </g>
  <line x1="138" y1="140" x2="184" y2="140" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- documents -->
  <g stroke="#9aa0a8" fill="#fafafa" stroke-width="1.2">
    <rect x="129" y="252" width="56" height="72" rx="5"/>
    <rect x="135" y="246" width="56" height="72" rx="5"/>
    <rect x="141" y="240" width="56" height="72" rx="5" fill="#ffffff"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="2" stroke-linecap="round">
    <line x1="149" y1="256" x2="189" y2="256"/>
    <line x1="149" y1="268" x2="183" y2="268"/>
    <line x1="149" y1="280" x2="187" y2="280"/>
    <line x1="149" y1="292" x2="177" y2="292"/>
  </g>
  <text x="163" y="350" text-anchor="middle" font-size="13" fill="#3b4252">documents</text>

  <!-- DocETL -->
  <rect x="332" y="40" width="276" height="330" rx="10" fill="none" stroke="#c4c8ce" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="348" y="64" font-size="12" fill="#8a8f98" font-weight="600" letter-spacing="0.4">DOCETL</text>

  <!-- optimizer -->
  <rect x="356" y="78" width="228" height="148" rx="10" fill="#fcfcfd" stroke="#9aa0a8" stroke-width="1.2"/>
  <text x="470" y="97" text-anchor="middle" font-size="13" fill="#3b4252" font-weight="600">optimizer</text>
  <text x="470" y="112" text-anchor="middle" font-size="10.5" fill="#8a8f98">(considers many rewrites)</text>
  <g fill="#f4f5f7" stroke="#c4c8ce" stroke-width="1.1">
    <rect x="386" y="122" width="36" height="20" rx="5"/>
    <rect x="432" y="122" width="36" height="20" rx="5"/>
    <rect x="386" y="188" width="36" height="20" rx="5"/>
    <rect x="432" y="188" width="36" height="20" rx="5"/>
    <rect x="478" y="188" width="36" height="20" rx="5"/>
  </g>
  <g fill="#eef0fb" stroke="#4051b5" stroke-width="1.4">
    <rect x="386" y="155" width="36" height="20" rx="5"/>
    <rect x="432" y="155" width="36" height="20" rx="5"/>
    <rect x="478" y="155" width="36" height="20" rx="5"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="1.1">
    <line x1="422" y1="132" x2="432" y2="132"/>
    <line x1="422" y1="198" x2="432" y2="198"/>
    <line x1="468" y1="198" x2="478" y2="198"/>
  </g>
  <g stroke="#4051b5" stroke-width="1.2">
    <line x1="422" y1="165" x2="432" y2="165"/>
    <line x1="468" y1="165" x2="478" y2="165"/>
  </g>
  <g stroke="#b3b8bf" stroke-width="1.8" stroke-linecap="round">
    <line x1="538" y1="126" x2="550" y2="138"/>
    <line x1="550" y1="126" x2="538" y2="138"/>
    <line x1="538" y1="192" x2="550" y2="204"/>
    <line x1="550" y1="192" x2="538" y2="204"/>
  </g>
  <path d="M 536 165 L 542 172 L 553 157" fill="none" stroke="#4051b5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="470" y1="226" x2="470" y2="258" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- execution engine -->
  <rect x="356" y="262" width="228" height="62" rx="10" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
  <text x="470" y="299" text-anchor="middle" font-size="13.5" fill="#2b3147" font-weight="600">execution engine</text>

  <!-- flows -->
  <line x1="274" y1="140" x2="352" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="197" y1="293" x2="352" y2="293" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 197 268 L 322 268 L 322 178 L 348 178" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="608" y1="293" x2="638" y2="293" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- output -->
  <g>
    <rect x="646" y="251" width="104" height="84" rx="6" fill="#ffffff" stroke="#9aa0a8" stroke-width="1.2"/>
    <rect x="646" y="251" width="104" height="20" rx="6" fill="#f1f2f4" stroke="#9aa0a8" stroke-width="1.2"/>
    <line x1="646" y1="271" x2="750" y2="271" stroke="#9aa0a8" stroke-width="1.2"/>
    <line x1="646" y1="292" x2="750" y2="292" stroke="#e3e5e8"/>
    <line x1="646" y1="313" x2="750" y2="313" stroke="#e3e5e8"/>
    <line x1="698" y1="251" x2="698" y2="335" stroke="#e3e5e8"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="2" stroke-linecap="round">
    <line x1="654" y1="261" x2="688" y2="261"/>
    <line x1="706" y1="261" x2="740" y2="261"/>
    <line x1="654" y1="282" x2="682" y2="282"/>
    <line x1="706" y1="282" x2="742" y2="282"/>
    <line x1="654" y1="303" x2="690" y2="303"/>
    <line x1="706" y1="303" x2="734" y2="303"/>
    <line x1="654" y1="324" x2="676" y2="324"/>
    <line x1="706" y1="324" x2="738" y2="324"/>
  </g>
  <text x="698" y="364" text-anchor="middle" font-size="13" fill="#3b4252">output</text>
</svg>
