<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 290" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="289" rx="12" fill="#ffffff" stroke="#e3e5e8"/>

  <!-- documents -->
  <g stroke="#9aa0a8" fill="#fafafa" stroke-width="1.2">
    <rect x="30" y="106" width="64" height="84" rx="5"/>
    <rect x="37" y="99" width="64" height="84" rx="5"/>
    <rect x="44" y="92" width="64" height="84" rx="5" fill="#ffffff"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="2" stroke-linecap="round">
    <line x1="53" y1="108" x2="99" y2="108"/>
    <line x1="53" y1="120" x2="92" y2="120"/>
    <line x1="53" y1="132" x2="97" y2="132"/>
    <line x1="53" y1="144" x2="85" y2="144"/>
    <line x1="53" y1="156" x2="95" y2="156"/>
  </g>
  <text x="69" y="226" text-anchor="middle" font-size="13" fill="#3b4252">documents</text>

  <line x1="116" y1="140" x2="148" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- your pipeline -->
  <g font-size="13.5" fill="#2b3147" text-anchor="middle">
    <rect x="156" y="118" width="74" height="44" rx="8" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
    <text x="193" y="145">map</text>
    <rect x="262" y="118" width="74" height="44" rx="8" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
    <text x="299" y="145">reduce</text>
  </g>
  <line x1="230" y1="140" x2="258" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="246" y="226" text-anchor="middle" font-size="13" fill="#3b4252">your pipeline</text>

  <line x1="344" y1="140" x2="376" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- optimizer: emits candidate pipelines, one selected -->
  <rect x="384" y="42" width="290" height="196" rx="10" fill="#fcfcfd" stroke="#9aa0a8" stroke-width="1.2"/>
  <text x="529" y="66" text-anchor="middle" font-size="13.5" fill="#3b4252" font-weight="600">optimizer</text>

  <!-- candidate 1 (not picked) -->
  <g font-size="11" fill="#6b7280" text-anchor="middle">
    <rect x="404" y="84" width="56" height="24" rx="6" fill="#f4f5f7" stroke="#c4c8ce"/>
    <text x="432" y="100">map</text>
    <rect x="476" y="84" width="56" height="24" rx="6" fill="#f4f5f7" stroke="#c4c8ce"/>
    <text x="504" y="100">reduce</text>
  </g>
  <line x1="460" y1="96" x2="472" y2="96" stroke="#c4c8ce" stroke-width="1.2"/>

  <!-- candidate 2: selected -->
  <g font-size="11" fill="#2b3147" text-anchor="middle">
    <rect x="404" y="128" width="56" height="24" rx="6" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
    <text x="432" y="144">split</text>
    <rect x="476" y="128" width="56" height="24" rx="6" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
    <text x="504" y="144">map</text>
    <rect x="548" y="128" width="56" height="24" rx="6" fill="#eef0fb" stroke="#4051b5" stroke-width="1.4"/>
    <text x="576" y="144">reduce</text>
  </g>
  <line x1="460" y1="140" x2="472" y2="140" stroke="#4051b5" stroke-width="1.2"/>
  <line x1="532" y1="140" x2="544" y2="140" stroke="#4051b5" stroke-width="1.2"/>
  <text x="612" y="144" font-size="11" fill="#4051b5" font-weight="600">picked</text>

  <!-- candidate 3 (not picked) -->
  <g font-size="11" fill="#6b7280" text-anchor="middle">
    <rect x="404" y="172" width="56" height="24" rx="6" fill="#f4f5f7" stroke="#c4c8ce"/>
    <text x="432" y="188">extract</text>
    <rect x="476" y="172" width="56" height="24" rx="6" fill="#f4f5f7" stroke="#c4c8ce"/>
    <text x="504" y="188">map</text>
    <rect x="548" y="172" width="56" height="24" rx="6" fill="#f4f5f7" stroke="#c4c8ce"/>
    <text x="576" y="188">reduce</text>
  </g>
  <line x1="460" y1="184" x2="472" y2="184" stroke="#c4c8ce" stroke-width="1.2"/>
  <line x1="532" y1="184" x2="544" y2="184" stroke="#c4c8ce" stroke-width="1.2"/>

  <text x="529" y="222" text-anchor="middle" font-size="12" fill="#6b7280">tries equivalent pipelines, picks one</text>
  <text x="529" y="259" text-anchor="middle" font-size="12.5" fill="#4051b5">lower cost, higher accuracy</text>

  <line x1="682" y1="140" x2="714" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- structured output -->
  <g>
    <rect x="722" y="94" width="128" height="92" rx="6" fill="#ffffff" stroke="#9aa0a8" stroke-width="1.2"/>
    <rect x="722" y="94" width="128" height="22" rx="6" fill="#f1f2f4" stroke="#9aa0a8" stroke-width="1.2"/>
    <line x1="722" y1="116" x2="850" y2="116" stroke="#9aa0a8" stroke-width="1.2"/>
    <line x1="722" y1="139" x2="850" y2="139" stroke="#e3e5e8"/>
    <line x1="722" y1="162" x2="850" y2="162" stroke="#e3e5e8"/>
    <line x1="786" y1="94" x2="786" y2="186" stroke="#e3e5e8"/>
  </g>
  <g stroke="#c4c8ce" stroke-width="2" stroke-linecap="round">
    <line x1="731" y1="105" x2="770" y2="105"/>
    <line x1="795" y1="105" x2="834" y2="105"/>
    <line x1="731" y1="128" x2="763" y2="128"/>
    <line x1="795" y1="128" x2="840" y2="128"/>
    <line x1="731" y1="151" x2="772" y2="151"/>
    <line x1="795" y1="151" x2="830" y2="151"/>
    <line x1="731" y1="174" x2="758" y2="174"/>
    <line x1="795" y1="174" x2="836" y2="174"/>
  </g>
  <text x="786" y="226" text-anchor="middle" font-size="13" fill="#3b4252">structured output</text>
</svg>
